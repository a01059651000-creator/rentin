<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 바로가기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg1:#0d0d1a;
  --bg2:#12122a;
  --glass:rgba(255,255,255,0.04);
  --glass2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);
  --accent:#818cf8;
  --accent2:#c084fc;
  --text:#f1f5f9;
  --text2:#94a3b8;
  --text3:#475569;
  --green:#34d399;
  --red:#f87171;
  --yellow:#fbbf24;
}

body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg1);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* 배경 오브 */
.bg-orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#6366f1,transparent);top:-100px;left:-100px;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#a855f7,transparent);bottom:-80px;right:-80px;}
.orb3{width:300px;height:300px;background:radial-gradient(circle,#06b6d4,transparent);top:40%;left:60%;}

/* 메인 */
.main{position:relative;z-index:1;padding:32px 24px 80px;max-width:1280px;margin:0 auto;}

/* 상단 */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;flex-wrap:wrap;gap:16px;}
.clock-wrap{}
.clock-time{font-size:clamp(40px,6vw,72px);font-weight:900;color:#fff;letter-spacing:-3px;line-height:1;background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,0.6) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.clock-date{font-size:14px;color:var(--text3);margin-top:4px;font-weight:500;}
.top-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
.top-title{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:2px;text-transform:uppercase;}

/* 검색 */
.search-wrap{position:relative;width:280px;}
.search-wrap input{
  width:100%;
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border2);
  border-radius:50px;
  padding:11px 18px 11px 42px;
  color:var(--text);
  font-size:13px;
  font-family:inherit;
  outline:none;
  transition:.2s;
}
.search-wrap input:focus{border-color:var(--accent);background:var(--glass2);}
.search-wrap input::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3);}
.top-actions{display:flex;gap:8px;}
.tbtn{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px 14px;
  color:var(--text2);
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
  transition:.2s;
  display:flex;align-items:center;gap:5px;
}
.tbtn:hover{border-color:var(--accent);color:var(--accent);background:rgba(129,140,248,0.08);}

/* 그리드 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}

/* 카테고리 카드 */
.cat-card{
  background:var(--glass);
  backdrop-filter:blur(24px);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  transition:all .25s;
  position:relative;
}
.cat-card::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:20px;
  background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 50%);
  pointer-events:none;
}
.cat-card:hover{
  border-color:var(--border2);
  transform:translateY(-2px);
  box-shadow:0 20px 40px rgba(0,0,0,0.3),0 0 0 1px rgba(255,255,255,0.06);
}

.cat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,0.02);
}
.cat-title-wrap{display:flex;align-items:center;gap:10px;}
.cat-emoji{
  width:34px;height:34px;
  background:linear-gradient(135deg,rgba(129,140,248,0.2),rgba(192,132,252,0.2));
  border:1px solid rgba(129,140,248,0.2);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  flex-shrink:0;
}
.cat-name{font-size:14px;font-weight:800;color:#fff;}
.cat-count{font-size:11px;color:var(--text3);margin-top:1px;}
.cat-actions{display:flex;gap:2px;opacity:0;transition:.2s;}
.cat-card:hover .cat-actions{opacity:1;}
.cat-btn{
  background:transparent;border:none;cursor:pointer;
  color:var(--text3);font-size:13px;
  padding:5px 7px;border-radius:7px;transition:.15s;
}
.cat-btn:hover{background:rgba(255,255,255,0.06);color:var(--text);}
.cat-btn.del:hover{color:var(--red);}
.drag-handle{cursor:grab;color:var(--text3);font-size:14px;padding:5px 4px;opacity:0.4;transition:.15s;}
.drag-handle:hover{opacity:1;color:var(--text);}
.drag-handle:active{cursor:grabbing;}

.todo-wrap{max-width:700px;margin:0 auto;}
.todo-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.todo-title{font-size:18px;font-weight:800;color:#fff;}
.todo-empty{text-align:center;padding:48px;color:var(--text3);font-size:14px;}

.todo-item{
  background:var(--glass);backdrop-filter:blur(24px);
  border:1px solid var(--border);border-radius:16px;
  padding:18px 20px;margin-bottom:10px;
  transition:all .2s;position:relative;
}
.todo-item::before{
  content:'';position:absolute;inset:0;border-radius:16px;
  background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 50%);
  pointer-events:none;
}
.todo-item.done{opacity:0.45;}
.todo-item.done .todo-name{text-decoration:line-through;color:var(--text3);}
.todo-item-top{display:flex;align-items:flex-start;gap:12px;}
.todo-check{
  width:22px;height:22px;border-radius:6px;
  border:2px solid var(--border2);
  background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:.2s;margin-top:1px;
}
.todo-check.checked{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;}
.todo-check.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:900;}
.todo-info{flex:1;}
.todo-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;}
.todo-content{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:6px;}
.todo-time{font-size:12px;color:var(--accent);font-weight:600;display:flex;align-items:center;gap:4px;}
.todo-time.past{color:var(--red);}
.todo-actions{display:flex;gap:4px;flex-shrink:0;}
.todo-btn{background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:4px 7px;border-radius:7px;transition:.15s;}
.todo-btn:hover{background:rgba(255,255,255,0.06);color:var(--text);}
.todo-btn.del:hover{color:var(--red);}
.todo-done-clear{
  width:100%;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);
  border-radius:10px;padding:10px;color:var(--red);font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;margin-top:8px;transition:.2s;
}
.todo-done-clear:hover{background:rgba(239,68,68,0.15);}
.sortable-ghost{opacity:0.3;}
.sortable-chosen{opacity:0.8;}

/* 북마크 */
.bm-list{padding:8px 10px;}
.bm-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:12px;
  cursor:pointer;transition:.15s;
  text-decoration:none;
  position:relative;
}
.bm-item:hover{background:rgba(255,255,255,0.06);}
.bm-favicon{
  width:22px;height:22px;border-radius:6px;
  flex-shrink:0;object-fit:contain;
  background:rgba(255,255,255,0.06);
}
.bm-favicon-ph{
  width:22px;height:22px;border-radius:6px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#fff;font-weight:800;
}
.bm-info{flex:1;min-width:0;}
.bm-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bm-url{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.bm-del{
  opacity:0;background:transparent;border:none;cursor:pointer;
  color:var(--text3);font-size:12px;padding:3px 6px;border-radius:6px;
  transition:.15s;flex-shrink:0;
}
.bm-item:hover .bm-del{opacity:1;}
.bm-del:hover{color:var(--red);background:rgba(248,113,113,0.1);}

/* 북마크 추가 버튼 */
.bm-add{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:12px;
  cursor:pointer;color:var(--text3);font-size:13px;
  border:1px dashed rgba(255,255,255,0.08);
  margin:4px 10px 10px;
  transition:.2s;background:transparent;
  width:calc(100% - 20px);font-family:inherit;
}
.bm-add:hover{border-color:rgba(129,140,248,0.4);color:var(--accent);background:rgba(129,140,248,0.05);}

/* 카테고리 추가 카드 */
.add-cat-card{
  background:rgba(255,255,255,0.02);
  backdrop-filter:blur(24px);
  border:1px dashed rgba(255,255,255,0.1);
  border-radius:20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;cursor:pointer;transition:.25s;
  color:var(--text3);font-size:14px;font-family:inherit;
  min-height:140px;
}
.add-cat-card:hover{
  border-color:rgba(129,140,248,0.4);
  color:var(--accent);
  background:rgba(129,140,248,0.04);
  transform:translateY(-2px);
}
.add-cat-card .plus{
  width:40px;height:40px;
  border-radius:12px;
  background:rgba(129,140,248,0.1);
  border:1px solid rgba(129,140,248,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:var(--accent);
  transition:.2s;
}
.add-cat-card:hover .plus{background:rgba(129,140,248,0.2);}

/* 모달 */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);
  z-index:100;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:rgba(18,18,42,0.95);
  backdrop-filter:blur(32px);
  border:1px solid var(--border2);
  border-radius:24px;
  padding:32px;
  width:100%;max-width:420px;
  box-shadow:0 32px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.08);
  position:relative;
}
.modal::before{
  content:'';position:absolute;inset:0;border-radius:24px;
  background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,transparent 60%);
  pointer-events:none;
}
.modal h3{font-size:17px;font-weight:800;color:#fff;margin-bottom:22px;}
.mfield{margin-bottom:14px;}
.mfield label{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:7px;letter-spacing:1px;text-transform:uppercase;}
.mfield input{
  width:100%;
  background:rgba(0,0,0,0.3);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 16px;
  color:var(--text);
  font-size:14px;font-family:inherit;outline:none;transition:.2s;
}
.mfield input:focus{border-color:var(--accent);}
.mfield input::placeholder{color:var(--text3);}
.mbtns{display:flex;gap:8px;margin-top:22px;}
.btn-ok{
  flex:1;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:12px;padding:12px;
  color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:.2s;
}
.btn-ok:hover{opacity:.88;transform:translateY(-1px);}
.btn-cancel{
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  border-radius:12px;padding:12px 20px;
  color:var(--text2);font-size:14px;
  font-family:inherit;cursor:pointer;transition:.2s;
}
.btn-cancel:hover{background:rgba(255,255,255,0.1);}

/* 빈 상태 */
.empty-bm{padding:16px;text-align:center;font-size:12px;color:var(--text3);}

.tabs{display:flex;gap:8px;margin-bottom:24px;}
.tab{
  background:var(--glass);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:50px;
  padding:9px 20px;color:var(--text2);font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:.2s;
}
.tab:hover{border-color:var(--border2);color:var(--text);}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;}

.calc-wrap{max-width:600px;margin:0 auto;}
.calc-card{
  background:var(--glass);backdrop-filter:blur(24px);
  border:1px solid var(--border);border-radius:24px;
  padding:36px 32px;
  position:relative;
}
.calc-card::before{
  content:'';position:absolute;inset:0;border-radius:24px;
  background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 50%);
  pointer-events:none;
}
.calc-title{font-size:18px;font-weight:800;color:#fff;margin-bottom:28px;}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.calc-field label{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:7px;letter-spacing:1px;text-transform:uppercase;}
.calc-field input{
  width:100%;background:rgba(0,0,0,0.3);
  border:1px solid var(--border);border-radius:12px;
  padding:12px 16px;color:var(--text);font-size:16px;
  font-family:inherit;outline:none;transition:.2s;
}
.calc-field input:focus{border-color:var(--accent);}
.calc-field input::placeholder{color:var(--text3);}
.calc-result{
  background:rgba(0,0,0,0.25);border:1px solid var(--border);
  border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:12px;
  margin-bottom:16px;
}
.result-row{display:flex;justify-content:space-between;align-items:center;font-size:14px;}
.result-row span:first-child{color:var(--text2);}
.result-row span:last-child{font-weight:700;color:var(--text);}
.result-row.highlight{
  background:rgba(129,140,248,0.1);border:1px solid rgba(129,140,248,0.2);
  border-radius:10px;padding:12px 14px;margin:4px 0;
}
.result-row.highlight span:first-child{color:var(--accent);font-weight:700;}
.result-row.highlight span:last-child{color:var(--accent);font-size:18px;font-weight:900;}

.calc-tip{font-size:12px;color:var(--text3);text-align:center;}

@media(max-width:768px){
  .calc-grid{grid-template-columns:1fr;}
  .calc-card{padding:24px 18px;}
}

@media(max-width:768px){
  .main{padding:20px 14px 60px;}
  .top-bar{flex-direction:column;align-items:flex-start;}
  .top-right{align-items:flex-start;width:100%;}
  .search-wrap{width:100%;}
  .grid{grid-template-columns:1fr;}
  .clock-time{font-size:52px;}
  .cat-actions{opacity:1;}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="main">
  <!-- 상단 -->
  <div class="top-bar">
    <div class="clock-wrap">
      <div class="clock-time" id="clockTime">00:00</div>
      <div class="clock-date" id="clockDate"></div>
    </div>
    <div class="top-right">
      <div class="top-title">🔖 내 바로가기</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="검색..." oninput="renderAll()">
      </div>

    </div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('bookmark')">🔖 북마크</button>
    <button class="tab" onclick="switchTab('todo')">✅ 할일</button>
    <button class="tab" onclick="switchTab('calc')">🧮 수수료 계산기</button>
  </div>

  <!-- 그리드 -->
  <div id="tabBookmark">
  <div class="grid" id="grid"></div>
  </div>

  <!-- 할일 -->
  <div id="tabTodo" style="display:none;">
    <div class="todo-wrap">
      <div class="todo-top">
        <h2 class="todo-title">✅ 할일 목록</h2>
        <button class="tbtn" onclick="openAddTodo()">+ 할일 추가</button>
      </div>
      <div id="todoList"></div>
    </div>
  </div>

  <!-- 수수료 계산기 -->
  <div id="tabCalc" style="display:none;">
    <div class="calc-wrap">
      <div class="calc-card">
        <h2 class="calc-title">🧮 렌탈 수수료 계산기</h2>
        <div class="calc-grid">
          <div class="calc-field">
            <label>월 렌탈료 (원)</label>
            <input type="number" id="cRental" placeholder="35000" oninput="calcFee()">
          </div>
          <div class="calc-field">
            <label>약정기간 (개월)</label>
            <input type="number" id="cMonths" placeholder="36" value="36" oninput="calcFee()">
          </div>
          <div class="calc-field">
            <label>수수료율 (%)</label>
            <input type="number" id="cRate" placeholder="15" value="15" step="0.1" oninput="calcFee()">
          </div>
        </div>
        <div class="calc-result" id="calcResult">

          <div class="result-row">
            <span>총 약정 금액</span>
            <span id="rTotal">-</span>
          </div>
          <div class="result-row highlight">
            <span>👤 개인 실수령 (13.3% 공제)</span>
            <span id="rNet133">-</span>
          </div>
          <div class="result-row highlight">
            <span>🏢 사업자 (부가세 포함)</span>
            <span id="rNetBiz">-</span>
          </div>
        </div>
        <div class="calc-tip">※ 수수료율은 렌탈사마다 다릅니다. 직접 입력하세요.</div>
      </div>
    </div>
  </div>
</div>

<!-- 할일 추가 모달 -->
<div class="modal-overlay" id="todoModal">
  <div class="modal">
    <h3 id="todoModalTitle">할일 추가</h3>
    <div class="mfield">
      <label>제목</label>
      <input type="text" id="todoName" placeholder="할일 제목">
    </div>
    <div class="mfield">
      <label>내용</label>
      <input type="text" id="todoContent" placeholder="상세 내용 (선택)">
    </div>
    <div class="mfield">
      <label>알림 날짜/시간</label>
      <input type="datetime-local" id="todoTime">
    </div>
    <div class="mbtns">
      <button class="btn-cancel" onclick="closeModal('todoModal')">취소</button>
      <button class="btn-ok" onclick="saveTodo()">저장</button>
    </div>
  </div>
</div>

<!-- 카테고리 모달 -->
<div class="modal-overlay" id="catModal">
  <div class="modal">
    <h3 id="catModalTitle">카테고리 추가</h3>
    <div class="mfield">
      <label>이모지</label>
      <input type="text" id="catEmoji" placeholder="🔖" maxlength="2">
    </div>
    <div class="mfield">
      <label>이름</label>
      <input type="text" id="catName" placeholder="카테고리 이름">
    </div>
    <div class="mbtns">
      <button class="btn-cancel" onclick="closeModal('catModal')">취소</button>
      <button class="btn-ok" onclick="saveCat()">저장</button>
    </div>
  </div>
</div>

<!-- 북마크 모달 -->
<div class="modal-overlay" id="bmModal">
  <div class="modal">
    <h3 id="bmModalTitle">북마크 추가</h3>
    <div class="mfield">
      <label>사이트 이름</label>
      <input type="text" id="bmName" placeholder="네이버">
    </div>
    <div class="mfield">
      <label>URL</label>

// 할일 데이터
let todos = [];

async function loadTodos(){
  try{
    const res = await fetch(`${SB_URL}/rest/v1/bookmarks?id=eq.todos`, {
      headers:{ 'apikey':SB_KEY, 'Authorization':`Bearer ${SB_KEY}` }
    });
    const rows = await res.json();
    if(rows && rows.length > 0 && rows[0].data){
      todos = rows[0].data;
    }
  }catch(e){ console.log('할일 로드 실패'); }
  renderTodos();
}

async function saveTodos(){
  try{
    await fetch(`${SB_URL}/rest/v1/bookmarks`, {
      method:'POST',
      headers:{
        'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,
        'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'
      },
      body: JSON.stringify({ id:'todos', data:todos, updated_at: new Date().toISOString() })
    });
  }catch(e){ console.log('할일 저장 실패'); }
}

function renderTodos(){
  const list = document.getElementById('todoList');
  if(!list) return;
  if(todos.length === 0){
    list.innerHTML = '<div class="todo-empty">할일이 없습니다 😊</div>';
    return;
  }
  // 미완료 먼저, 완료 나중
  const sorted = [...todos].sort((a,b) => {
    if(a.done === b.done) return new Date(a.time) - new Date(b.time);
    return a.done ? 1 : -1;
  });
  list.innerHTML = '';
  sorted.forEach(todo => {
    const isPast = todo.time && new Date(todo.time) < new Date() && !todo.done;
    const timeStr = todo.time ? new Date(todo.time).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    const div = document.createElement('div');
    div.className = 'todo-item' + (todo.done ? ' done' : '');
    div.innerHTML = `
      <div class="todo-item-top">
        <div class="todo-check ${todo.done?'checked':''}" onclick="toggleTodo('${todo.id}')"></div>
        <div class="todo-info">
          <div class="todo-name">${todo.name}</div>
          ${todo.content ? `<div class="todo-content">${todo.content}</div>` : ''}
          ${timeStr ? `<div class="todo-time ${isPast?'past':''}">⏰ ${timeStr}${isPast?' · 지남':''}</div>` : ''}
        </div>
        <div class="todo-actions">
          <button class="todo-btn del" onclick="deleteTodo('${todo.id}')">🗑️</button>
        </div>
      </div>
    `;
    list.appendChild(div);
  });
  // 완료된 항목 있으면 일괄삭제 버튼
  if(todos.some(t=>t.done)){
    const clearBtn = document.createElement('button');
    clearBtn.className = 'todo-done-clear';
    clearBtn.textContent = '✓ 완료된 항목 전체 삭제';
    clearBtn.onclick = clearDoneTodos;
    list.appendChild(clearBtn);
  }
}

function openAddTodo(){
  document.getElementById('todoModalTitle').textContent = '할일 추가';
  document.getElementById('todoName').value = '';
  document.getElementById('todoContent').value = '';
  // 기본값: 1시간 후
  const d = new Date(Date.now() + 3600000);
  const local = new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16);
  document.getElementById('todoTime').value = local;
  document.getElementById('todoModal').classList.add('open');
  setTimeout(()=>document.getElementById('todoName').focus(),100);
}

async function saveTodo(){
  const name = document.getElementById('todoName').value.trim();
  if(!name){ alert('제목을 입력해주세요.'); return; }
  const content = document.getElementById('todoContent').value.trim();
  const time = document.getElementById('todoTime').value;
  const todoId = uid();

  todos.push({ id:todoId, name, content, time, done:false, created: new Date().toISOString() });
  await saveTodos();

  // 알림 시간 있으면 todos_alert 테이블에도 저장 (2시간 전 알림)
  if(time){
    try{
      const alertTime = new Date(new Date(time).getTime() - 2 * 60 * 60 * 1000).toISOString();
      await fetch(`${SB_URL}/rest/v1/todos_alert`, {
        method:'POST',
        headers:{
          'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,
          'Content-Type':'application/json','Prefer':'return=minimal'
        },
        body: JSON.stringify({ id:todoId, name, content, alert_time:alertTime, sent:false, todo_time:new Date(time).toISOString() })
      });
    }catch(e){ console.log('알림 저장 실패'); }
  }

  renderTodos();
  closeModal('todoModal');
}

async function toggleTodo(id){
  const todo = todos.find(t=>t.id===id);
  if(todo) todo.done = !todo.done;
  await saveTodos();
  renderTodos();
}

async function deleteTodo(id){
  todos = todos.filter(t=>t.id!==id);
  await saveTodos();
  // todos_alert에서도 삭제
  try{
    await fetch(`${SB_URL}/rest/v1/todos_alert?id=eq.${id}`, {
      method:'DELETE',
      headers:{ 'apikey':SB_KEY, 'Authorization':`Bearer ${SB_KEY}` }
    });
  }catch(e){}
  renderTodos();
}

async function clearDoneTodos(){
  if(!confirm('완료된 항목을 모두 삭제할까요?')) return;
  todos = todos.filter(t=>!t.done);
  await saveTodos();
  renderTodos();
}

function switchTab(tab){
  document.getElementById('tabBookmark').style.display = tab==='bookmark' ? 'block' : 'none';
  document.getElementById('tabTodo').style.display = tab==='todo' ? 'block' : 'none';
  document.getElementById('tabCalc').style.display = tab==='calc' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', (tab==='bookmark'&&i===0)||(tab==='todo'&&i===1)||(tab==='calc'&&i===2));
  });
  if(tab==='todo') renderTodos();
}

function calcFee(){
  const rental = parseFloat(document.getElementById('cRental').value) || 0;
  const months = parseFloat(document.getElementById('cMonths').value) || 0;
  const rate = parseFloat(document.getElementById('cRate').value) || 0;

  const monthly = rental;
  const total = monthly * months;
  const fee = total * (rate / 100);
  const net133 = fee * (1 - 0.133);

  function fmt(n){ return n > 0 ? Math.round(n).toLocaleString() + ' 원' : '-'; }

  const biz = fee * 1.1;

  document.getElementById('rTotal').textContent = fmt(total);
  document.getElementById('rNet133').textContent = fmt(net133);
  document.getElementById('rNetBiz').textContent = fmt(biz);
}

load();
loadTodos();
