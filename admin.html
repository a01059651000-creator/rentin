<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정수기마켓 계약 어드민</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
        :root { --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3248; --accent:#4f8ef7; --accent2:#7c5cfc; --green:#22c55e; --red:#ef4444; --yellow:#f59e0b; --text:#e8eaf6; --text2:#8b92b8; --text3:#555e8a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        #loginScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; background:radial-gradient(ellipse at 30% 40%,rgba(79,142,247,.12) 0%,transparent 60%),radial-gradient(ellipse at 70% 60%,rgba(124,92,252,.10) 0%,transparent 55%),var(--bg); }
        .login-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:48px 40px; width:380px; text-align:center; box-shadow:0 24px 80px rgba(0,0,0,.5); }
        .login-logo { width:56px; height:56px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:26px; margin:0 auto 20px; }
        .login-card h2 { font-size:22px; font-weight:700; margin-bottom:6px; }
        .login-card p { color:var(--text2); font-size:13px; margin-bottom:32px; }
        .login-input { width:100%; padding:14px 16px; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:15px; font-family:inherit; outline:none; letter-spacing:4px; text-align:center; transition:border-color .2s; margin-bottom:16px; }
        .login-input:focus { border-color:var(--accent); }
        .login-btn { width:100%; padding:14px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:10px; color:#fff; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer; transition:opacity .2s; }
        .login-btn:hover { opacity:.88; }
        .login-error { color:var(--red); font-size:13px; margin-top:12px; height:18px; }
        #adminApp { display:none; min-height:100vh; }
        .sidebar { position:fixed; left:0; top:0; bottom:0; width:220px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:24px 0; z-index:100; }
        .sidebar-logo { padding:0 20px 28px; border-bottom:1px solid var(--border); margin-bottom:20px; }
        .sidebar-logo .brand { font-size:15px; font-weight:700; color:var(--accent); }
        .sidebar-logo .sub { font-size:11px; color:var(--text3); margin-top:3px; }
        .nav-item { display:flex; align-items:center; gap:10px; padding:11px 20px; font-size:13px; font-weight:500; color:var(--text2); cursor:pointer; transition:all .15s; border-left:3px solid transparent; }
        .nav-item:hover { color:var(--text); background:rgba(255,255,255,.03); }
        .nav-item.active { color:var(--accent); border-left-color:var(--accent); background:rgba(79,142,247,.07); }
        .nav-icon { font-size:16px; width:20px; text-align:center; }
        .sidebar-bottom { margin-top:auto; padding:20px; }
        .logout-btn { width:100%; padding:10px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text2); font-size:12px; font-family:inherit; cursor:pointer; transition:.2s; }
        .logout-btn:hover { border-color:var(--red); color:var(--red); }
        .main { margin-left:220px; padding:32px; }
        .page-header { margin-bottom:28px; }
        .page-header h1 { font-size:24px; font-weight:700; }
        .page-header p { color:var(--text2); font-size:13px; margin-top:4px; }
        .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
        .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; }
        .stat-label { font-size:12px; color:var(--text2); margin-bottom:10px; }
        .stat-val { font-size:28px; font-weight:700; }
        .stat-sub { font-size:11px; color:var(--text3); margin-top:4px; }
        .stat-card.blue .stat-val { color:var(--accent); }
        .stat-card.green .stat-val { color:var(--green); }
        .stat-card.purple .stat-val { color:var(--accent2); }
        .stat-card.yellow .stat-val { color:var(--yellow); }
        .toolbar { display:flex; gap:12px; margin-bottom:20px; align-items:center; flex-wrap:wrap; }
        .search-box { flex:1; min-width:200px; padding:10px 14px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; font-family:inherit; outline:none; transition:border-color .2s; }
        .search-box:focus { border-color:var(--accent); }
        .filter-btn { padding:10px 16px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text2); font-size:12px; font-family:inherit; cursor:pointer; transition:all .15s; font-weight:500; }
        .filter-btn:hover,.filter-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(79,142,247,.08); }
        .refresh-btn { padding:10px 16px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:8px; color:#fff; font-size:12px; font-family:inherit; cursor:pointer; font-weight:600; transition:opacity .2s; }
        .refresh-btn:hover { opacity:.85; }
        .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; }
        thead th { padding:12px 16px; text-align:left; font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; background:rgba(0,0,0,.2); border-bottom:1px solid var(--border); }
        tbody tr { border-bottom:1px solid rgba(255,255,255,.04); transition:background .15s; cursor:pointer; }
        tbody tr:hover { background:rgba(79,142,247,.05); }
        tbody tr:last-child { border-bottom:none; }
        tbody td { padding:14px 16px; font-size:13px; }
        .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
        .badge-indi { background:rgba(79,142,247,.15); color:var(--accent); }
        .badge-biz { background:rgba(124,92,252,.15); color:var(--accent2); }
        .empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
        .empty-state .ico { font-size:40px; margin-bottom:12px; }
        .loading-row td { text-align:center; padding:40px; color:var(--text2); }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(4px); z-index:200; align-items:flex-start; justify-content:center; padding:24px; overflow-y:auto; }
        .modal-overlay.open { display:flex; }
        .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; width:100%; max-width:880px; box-shadow:0 40px 100px rgba(0,0,0,.6); animation:modalIn .25s ease; }
        @keyframes modalIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .modal-header { display:flex; align-items:center; justify-content:space-between; padding:20px 24px; border-bottom:1px solid var(--border); }
        .modal-title { font-size:17px; font-weight:700; }
        .modal-close { width:32px; height:32px; background:rgba(255,255,255,.06); border:none; border-radius:8px; color:var(--text2); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .modal-body { padding:24px; }
        .tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--bg); border-radius:10px; padding:4px; }
        .tab-btn { flex:1; padding:9px; background:transparent; border:none; border-radius:7px; color:var(--text2); font-size:13px; font-weight:500; font-family:inherit; cursor:pointer; transition:all .15s; }
        .tab-btn.active { background:var(--surface); color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,.3); }
        .contract-preview { background:#fff; color:#333; border-radius:10px; padding:30px; font-family:'Noto Sans KR',sans-serif; font-size:13px; line-height:1.8; }
        .contract-preview h1 { text-align:center; font-size:22px; border-bottom:2px solid #222; padding-bottom:12px; margin-bottom:20px; color:#111; }
        .contract-preview h2 { font-size:14px; border-left:4px solid #2c3e50; padding-left:8px; color:#2c3e50; margin:20px 0 10px; }
        .preview-table { width:100%; border-collapse:collapse; margin-bottom:16px; }
        .preview-table th,.preview-table td { border:1px solid #ddd; padding:9px 12px; font-size:13px; }
        .preview-table th { background:#f8f9fa; width:30%; font-weight:600; text-align:left; }
        .sig-img { max-height:50px; }
        .files-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
        .file-card { background:var(--surface2); border:1px solid var(--border); border-radius:12px; overflow:hidden; cursor:pointer; transition:transform .15s,box-shadow .15s; }
        .file-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.3); }
        .file-thumb { width:100%; height:160px; object-fit:cover; display:block; background:var(--bg); }
        .file-thumb-placeholder { width:100%; height:160px; display:flex; align-items:center; justify-content:center; background:var(--bg); font-size:40px; }
        .file-label { padding:12px; font-size:12px; color:var(--text2); font-weight:500; }
        .file-open-btn { display:block; margin:0 12px 12px; padding:8px; background:rgba(79,142,247,.12); border:1px solid rgba(79,142,247,.25); border-radius:6px; color:var(--accent); font-size:12px; font-weight:600; text-align:center; text-decoration:none; transition:background .15s; }
        .file-open-btn:hover { background:rgba(79,142,247,.22); }
        .no-file { padding:20px; text-align:center; color:var(--text3); font-size:12px; }
        .modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }
        .btn-pdf { padding:10px 20px; background:linear-gradient(135deg,#ef4444,#dc2626); border:none; border-radius:8px; color:#fff; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; transition:opacity .2s; }
        .btn-pdf:hover { opacity:.85; }
        .btn-close2 { padding:10px 20px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text2); font-size:13px; font-family:inherit; cursor:pointer; }
        .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:300; align-items:center; justify-content:center; }
        .lightbox.open { display:flex; }
        .lightbox img { max-width:90vw; max-height:90vh; border-radius:8px; }
        .lightbox-close { position:fixed; top:20px; right:24px; background:rgba(255,255,255,.1); border:none; border-radius:50%; width:40px; height:40px; color:#fff; font-size:20px; cursor:pointer; }
        @media(max-width:900px) { .stats-grid{grid-template-columns:repeat(2,1fr);} .sidebar{display:none;} .main{margin-left:0;padding:16px;} }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <div class="login-logo">🔒</div>
        <h2>관리자 로그인</h2>
        <p>정수기마켓 계약 어드민</p>
        <input type="password" class="login-input" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="login-btn" onclick="doLogin()">로그인</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<div id="adminApp">
    <nav class="sidebar">
        <div class="sidebar-logo">
            <div class="brand">💧 정수기마켓</div>
            <div class="sub">파트너 계약 관리 시스템</div>
        </div>
        <div class="nav-item active" onclick="showPage('contracts')"><span class="nav-icon">📋</span> 계약 목록</div>
        <div class="sidebar-bottom">
            <button class="logout-btn" onclick="doLogout()">🚪 로그아웃</button>
        </div>
    </nav>

    <main class="main">
        <div id="page-contracts">
            <div class="page-header">
                <h1>파트너 계약 목록</h1>
                <p>Supabase에서 실시간으로 불러옵니다</p>
            </div>
            <div class="stats-grid">
                <div class="stat-card blue"><div class="stat-label">전체 계약</div><div class="stat-val" id="statTotal">-</div><div class="stat-sub">누적</div></div>
                <div class="stat-card green"><div class="stat-label">이번 달</div><div class="stat-val" id="statMonth">-</div><div class="stat-sub">신규 접수</div></div>
                <div class="stat-card purple"><div class="stat-label">개인 파트너</div><div class="stat-val" id="statIndi">-</div><div class="stat-sub">프리랜서</div></div>
                <div class="stat-card yellow"><div class="stat-label">사업자 파트너</div><div class="stat-val" id="statBiz">-</div><div class="stat-sub">개인/법인</div></div>
            </div>
            <div class="toolbar">
                <input class="search-box" id="searchInput" placeholder="🔍  이름, 연락처, 주소 검색..." oninput="renderTable()">
                <button class="filter-btn active" id="filterAll" onclick="setFilter('all')">전체</button>
                <button class="filter-btn" id="filterIndi" onclick="setFilter('individual')">개인</button>
                <button class="filter-btn" id="filterBiz" onclick="setFilter('business')">사업자</button>
                <button class="refresh-btn" onclick="loadContracts()">🔄 새로고침</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>#</th><th>성함/상호</th><th>연락처</th><th>유형</th><th>주소</th><th>접수일</th><th>서류</th></tr></thead>
                    <tbody id="contractTable"><tr class="loading-row"><td colspan="7">⏳ 데이터 로딩 중...</td></tr></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">계약 상세</div>
            <button class="modal-close" onclick="closeModalDirect()">×</button>
        </div>
        <div class="modal-body">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('preview')">📄 계약서 미리보기</button>
                <button class="tab-btn" onclick="switchTab('files')">📎 첨부 서류</button>
            </div>
            <div id="tabPreview"></div>
            <div id="tabFiles" style="display:none"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-close2" onclick="closeModalDirect()">닫기</button>
            <button class="btn-pdf" onclick="downloadPDF()">📥 PDF 저장</button>
        </div>
    </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <img id="lightboxImg" src="" alt="">
</div>

<script>
    const SUPABASE_URL = "https://nhyehgknkwwhebtprwzo.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeWVoZ2tua3d3aGVidHByd3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODIyOTMsImV4cCI6MjA4OTE1ODI5M30.pfAcmyCDhSREXaIwlOy3RmqGfpmkBK1SiKN12ay8Ss0";
    const ADMIN_PW = "fpsxmdls11@";

    function doLogin() {
        const pw = document.getElementById('pwInput').value;
        if (pw === ADMIN_PW) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminApp').style.display = 'block';
            loadContracts();
        } else {
            document.getElementById('loginError').textContent = '비밀번호가 올바르지 않습니다.';
            document.getElementById('pwInput').value = '';
            setTimeout(() => document.getElementById('loginError').textContent = '', 2500);
        }
    }

    function doLogout() {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminApp').style.display = 'none';
        document.getElementById('pwInput').value = '';
    }

    function showPage(name) {
        document.getElementById('page-contracts').style.display = name === 'contracts' ? '' : 'none';
    }

    window._allContracts = [];
    window._filter = 'all';

    async function loadContracts() {
        const tbody = document.getElementById('contractTable');
        tbody.innerHTML = '<tr class="loading-row"><td colspan="7">⏳ 불러오는 중...</td></tr>';
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/contracts?select=*&source=eq.정수기마켓&order=created_at.desc`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            if (!res.ok) throw new Error(await res.text());
            window._allContracts = await res.json();
            updateStats();
            renderTable();
        } catch(e) {
            tbody.innerHTML = `<tr class="loading-row"><td colspan="7" style="color:#ef4444">⚠️ 로드 실패: ${e.message}</td></tr>`;
        }
    }

    function updateStats() {
        const all = window._allContracts;
        const now = new Date();
        document.getElementById('statTotal').textContent = all.length;
        document.getElementById('statMonth').textContent = all.filter(c => {
            if (!c.created_at) return false;
            const d = new Date(c.created_at);
            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }).length;
        document.getElementById('statIndi').textContent = all.filter(c => c.partner_type === 'individual').length;
        document.getElementById('statBiz').textContent = all.filter(c => c.partner_type === 'business').length;
    }

    function renderTable() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filter = window._filter;
        let data = window._allContracts.filter(c => {
            if (filter === 'individual' && c.partner_type !== 'individual') return false;
            if (filter === 'business' && c.partner_type !== 'business') return false;
            if (q) { const str = `${c.partner_name} ${c.partner_phone} ${c.address||''}`.toLowerCase(); if (!str.includes(q)) return false; }
            return true;
        });
        const tbody = document.getElementById('contractTable');
        if (!data.length) { tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="ico">📭</div>데이터가 없습니다</div></td></tr>'; return; }
        tbody.innerHTML = data.map((c, i) => {
            const date = c.created_at ? new Date(c.created_at).toLocaleDateString('ko-KR') : '-';
            const typeBadge = c.partner_type === 'individual' ? '<span class="badge badge-indi">개인</span>' : '<span class="badge badge-biz">사업자</span>';
            const hasFiles = [c.id_card_url, c.bank_book_url, c.biz_lic_url].filter(Boolean).length;
            return `<tr onclick="openDetail(${c.id})">
                <td style="color:var(--text3)">${i+1}</td>
                <td style="font-weight:600">${c.partner_name||'-'}</td>
                <td>${c.partner_phone||'-'}</td>
                <td>${typeBadge}</td>
                <td style="color:var(--text2);font-size:12px">${(c.address||'-').slice(0,20)}${c.address&&c.address.length>20?'...':''}</td>
                <td style="color:var(--text2)">${date}</td>
                <td style="color:var(--text2)">${hasFiles}개</td>
            </tr>`;
        }).join('');
    }

    function setFilter(type) {
        window._filter = type;
        ['All','Indi','Biz'].forEach(t => document.getElementById('filter'+t).classList.remove('active'));
        const map = {all:'All',individual:'Indi',business:'Biz'};
        document.getElementById('filter'+map[type]).classList.add('active');
        renderTable();
    }

    function openDetail(id) {
        const c = window._allContracts.find(x => x.id === id);
        if (!c) return;
        window._currentContract = c;
        document.getElementById('modalTitle').textContent = `📋 ${c.partner_name} 계약 상세`;
        document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));
        document.getElementById('tabPreview').style.display = '';
        document.getElementById('tabFiles').style.display = 'none';

        const date = c.created_at ? new Date(c.created_at).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'}) : '-';
        document.getElementById('tabPreview').innerHTML = `
            <div class="contract-preview" id="contractPreviewContent">
                <h1>파트너 업무 위탁 계약서</h1>
                <p><strong>(주)정수기마켓</strong>과 아래 인적사항의 <strong>파트너</strong>는 상호 매출 증대를 도모하기 위하여 다음과 같이 파트너 계약을 체결한다.</p>
                <h2>[파트너 정보 (갑)]</h2>
                <table class="preview-table">
                    ${c.partner_type==='business' ? `<tr><th>상호명</th><td>${c.biz_name||'-'}</td></tr><tr><th>사업자등록번호</th><td>${c.biz_num||'-'}</td></tr>` : `<tr><th>주민등록번호</th><td>${c.resident_num||'-'}</td></tr>`}
                    <tr><th>성함 및 서명</th><td>${c.partner_name||'-'}${c.signature_img?`<img src="${c.signature_img}" class="sig-img" style="margin-left:12px">`:''}  </td></tr>
                    <tr><th>연락처</th><td>${c.partner_phone||'-'}</td></tr>
                    <tr><th>주소</th><td>${c.address||'-'}</td></tr>
                    <tr><th>파트너 유형</th><td>${c.partner_type==='individual'?'개인(프리랜서)':'사업자(개인/법인)'}</td></tr>
                </table>
                <h2>[본사 정보 (을)]</h2>
                <table class="preview-table">
                    <tr><th>상호(법인명)</th><td>(주)정수기마켓</td></tr>
                    <tr><th>사업자등록번호</th><td>574-86-03026</td></tr>
                    <tr><th>주소</th><td>대전광역시 유성구 유성대로 789 501호</td></tr>
                    <tr><th>대표자</th><td><div style="display:flex;align-items:center;gap:5px">김효상 (인)<img src="https://raw.githubusercontent.com/a01059651000-creator/rentin/main/%EC%A3%BC%EC%8B%9D%ED%9A%8C%EC%82%AC%20%EC%A0%95%EC%88%98%EA%B8%B0%EB%A7%88%EC%BC%93_%EB%8F%84%EC%9E%A5.png" style="width:48px;height:48px"></div></td></tr>
                </table>
                <h2>제 1 조 【계약의 목적】</h2><p>본 계약은 렌탈 상품에 대하여 "갑"에게 영업 활동을 위탁하고 필요한 제반 사항을 규정함을 목적으로 한다.</p>
                <h2>제 2 조 【수수료 정산 및 지급】</h2><p>① 수수료 정산은 익월 말일에 지급한다.<br>② ${c.partner_type==='individual'?'개인 파트너는 수수료 총액에서 13.3%(부가가치세 및 사업소득세 포함)를 공제한 후 지급한다.':'사업자 파트너는 수수료 총액에 부가가치세(10%)가 포함된 금액으로 정산하며 세금계산서 발행을 원칙으로 한다.'}</p>
                <h2>제 3 조 【분양몰 구축 및 호스팅 비용】</h2><p>영업용 분양몰 구축 및 호스팅 임대 비용으로 금 300,000원(VAT별도, 1년 기준)을 최초 1회 지급한다. 구축 시작 후 환불 불가하다.</p>
                <h2>제 4 조 【수수료의 환수】</h2><p>고객의 렌탈 약정 기간 내 중도 해지, 철회 시 기 지급된 수수료는 렌탈사 정책에 따라 환수(대물림)되며 "갑"은 이를 반환할 의무가 있다.</p>
                <h2>제 5 조 【개인정보 보호 및 기밀 유지】</h2><p>"갑"은 업무 수행 중 취득한 모든 고객 정보를 관련 법령에 따라 보호하여야 하며, 외부 유출 시 모든 책임을 진다.</p>
                <h2>제 6 조 【계약 기간 및 자동 연장】</h2><p>본 계약은 체결일로부터 1년간 유효하며, 종료 30일 전까지 해지 통보가 없는 한 동일한 조건으로 1년 단위 자동 연장된다.</p>
                <h2>제 7 조 【계약의 해지】</h2><p>상대방의 명예 실추, 기밀 누설, 실적 저조, 타사 영업 활동 등 신뢰 관계를 저해하는 행위 발생 시 "을"은 본 계약을 즉시 해지할 수 있다.</p>
                <h2>제 8 조 【비밀의 유지】</h2><p>"갑"은 본 계약 이행 중 알게 된 업무상 비밀과 고객 정보를 제3자에게 누설해서는 아니 된다. 위반 시 민형사상 모든 책임을 진다.</p>
                <h2>제 9 조 【해석 및 관할법원】</h2><p>협의 불능 시 관할법원은 "을"의 소재지 관할법원으로 한다.</p>
                <h2>제 10 조 【특약사항】</h2><p>합의된 특약이 있는 경우 이를 우선 적용하며, "갑"은 구축에 필요한 자료를 성실히 제공해야 한다.</p>
                <div style="margin-top:40px;text-align:center;padding-top:20px;border-top:1px solid #eee;font-weight:bold">
                    <div style="font-size:16px;margin-bottom:8px">${date}</div>
                    <p style="font-size:12px;color:#888">(본 계약서는 전자적 방식으로 체결되어 양측이 각각 보관한다)</p>
                </div>
            </div>`;

        const files = [
            {label:'신분증 사본', url:c.id_card_url},
            {label:'통장 사본', url:c.bank_book_url},
            {label:'사업자등록증', url:c.biz_lic_url},
        ];
        document.getElementById('tabFiles').innerHTML = `<div class="files-grid">` + files.map(f => {
            if (!f.url) return `<div class="file-card"><div class="file-thumb-placeholder">📂</div><div class="file-label">${f.label}</div><div class="no-file">미제출</div></div>`;
            const isPdf = f.url.toLowerCase().includes('.pdf');
            return `<div class="file-card">
                ${isPdf ? `<div class="file-thumb-placeholder">📄</div>` : `<img class="file-thumb" src="${f.url}" alt="${f.label}" onclick="openLightbox('${f.url}',event)">`}
                <div class="file-label">${f.label}</div>
                <a href="${f.url}" target="_blank" class="file-open-btn">🔗 원본 열기</a>
            </div>`;
        }).join('') + `</div>`;

        document.getElementById('detailModal').classList.add('open');
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active',(i===0&&tab==='preview')||(i===1&&tab==='files')));
        document.getElementById('tabPreview').style.display = tab==='preview'?'':'none';
        document.getElementById('tabFiles').style.display = tab==='files'?'':'none';
    }

    function closeModal(e) { if (e.target.id==='detailModal') closeModalDirect(); }
    function closeModalDirect() { document.getElementById('detailModal').classList.remove('open'); }
    function openLightbox(url, e) { e.stopPropagation(); document.getElementById('lightboxImg').src=url; document.getElementById('lightbox').classList.add('open'); }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

    async function downloadPDF() {
        const el = document.getElementById('contractPreviewContent');
        if (!el) return;
        const c = window._currentContract;
        const btn = document.querySelector('.btn-pdf');
        btn.textContent = '⏳ 생성 중...'; btn.disabled = true;
        try {
            const canvas = await html2canvas(el, {scale:2, useCORS:true, backgroundColor:'#ffffff'});
            const imgData = canvas.toDataURL('image/jpeg', 0.92);
            const {jsPDF} = window.jspdf;
            const pdf = new jsPDF({orientation:'p', unit:'mm', format:'a4'});
            const pW = pdf.internal.pageSize.getWidth();
            const pH = pdf.internal.pageSize.getHeight();
            const imgH = pW * (canvas.height / canvas.width);
            if (imgH <= pH) {
                pdf.addImage(imgData,'JPEG',0,0,pW,imgH);
            } else {
                let yOffset=0, remaining=imgH;
                while(remaining>0) { pdf.addImage(imgData,'JPEG',0,-yOffset,pW,imgH); remaining-=pH; yOffset+=pH; if(remaining>0) pdf.addPage(); }
            }
            pdf.save(`계약서_${c.partner_name}_${new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','')}.pdf`);
        } catch(e) { alert('PDF 생성 오류: '+e.message); }
        finally { btn.textContent='📥 PDF 저장'; btn.disabled=false; }
    }
</script>
