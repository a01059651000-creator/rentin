<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정수기마켓 - 보안 관리자 시스템</title>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 파이어베이스 설정
        const firebaseConfig = {
            apiKey: "AIzaSyD3A4xrFozCh10clw6hzhrgD7rRvXGojIU",
            authDomain: "rentinp-172dd.firebaseapp.com",
            projectId: "rentinp-172dd",
            storageBucket: "rentinp-172dd.firebasestorage.app",
            messagingSenderId: "176082975122",
            appId: "1:176082975122:web:b792b8ad175dfa6bb7e94b"
        };

        // 접속 비밀번호 설정 (원하시는 대로 수정하세요)
        const ADMIN_PASSWORD = "rlagytkd11@"; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "rentinp-172dd";

        async function initSystem() {
            const pw = prompt("관리자 인증이 필요합니다. 비밀번호를 입력하세요.");
            if (pw !== ADMIN_PASSWORD) {
                alert("인증에 실패했습니다. 접근 권한이 없습니다.");
                document.body.innerHTML = "<div style='text-align:center; padding-top:100px;'>🔒 승인되지 않은 접근입니다.</div>";
                return;
            }
            
            // 비밀번호가 맞을 때만 시스템 가동
            document.getElementById('secure-overlay').style.display = 'none';
            await loadContracts();
        }

        async function loadContracts() {
            const listEl = document.getElementById('contract-list');
            listEl.innerHTML = "<tr><td colspan='5' style='text-align:center;'>보안 채널 연결 중...</td></tr>";

            try {
                await signInAnonymously(auth);
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'contracts'));
                const querySnapshot = await getDocs(q);
                
                listEl.innerHTML = "";
                const docs = [];
                querySnapshot.forEach(doc => docs.push({id: doc.id, ...doc.data()}));
                docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                docs.forEach(data => {
                    const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString() : "-";
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${date}</td>
                        <td><strong>${data.partnerName}</strong></td>
                        <td>${data.partnerPhone}</td>
                        <td>${data.partnerType === 'individual' ? '개인' : '사업자'}</td>
                        <td>
                            <button class="btn-view" onclick='viewContract(${JSON.stringify(data).replace(/'/g, "&apos;")})'>전체 데이터 조회</button>
                        </td>
                    `;
                    listEl.appendChild(tr);
                });
            } catch (e) {
                listEl.innerHTML = "<tr><td colspan='5' style='color:red;'>보안 오류: 데이터 로드 실패</td></tr>";
            }
        }

        window.viewContract = function(data) {
            const modal = document.getElementById('modal');
            document.getElementById('m-name').innerText = data.partnerName;
            document.getElementById('m-name-2').innerText = data.partnerName;
            document.getElementById('m-phone').innerText = data.partnerPhone;
            document.getElementById('m-addr').innerText = data.address || "-";
            document.getElementById('m-type-info').innerText = data.partnerType === 'individual' ? `주민번호: ${data.residentNum || '-'}` : `사업자번호: ${data.bizNum || '-'}`;
            document.getElementById('m-sig').src = data.signatureImg;
            
            const docsArea = document.getElementById('m-docs-area');
            docsArea.innerHTML = `
                <h3>[보안 저장소 데이터]</h3>
                <div class="doc-item"><p>신분증</p><img src="${data.idCardUrl}" class="doc-img"></div>
                <div class="doc-item"><p>통장사본</p><img src="${data.bankBookUrl}" class="doc-img"></div>
                ${data.bizLicUrl ? `<div class="doc-item"><p>사업자등록증</p><img src="${data.bizLicUrl}" class="doc-img"></div>` : ''}
            `;
            
            const dateObj = data.createdAt ? new Date(data.createdAt.seconds * 1000) : new Date();
            document.getElementById('m-date').innerText = `${dateObj.getFullYear()}년 ${dateObj.getMonth()+1}월 ${dateObj.getDate()}일`;
            modal.style.display = 'block';
        };

        window.closeModal = () => { document.getElementById('modal').style.display = 'none'; };
        window.printModal = () => { window.print(); };

        // 시작 시 비번 체크
        window.onload = initSystem;

    </script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #2c3e50; margin: 0; padding: 30px; color: #fff; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; color: #333; }
        h1 { font-size: 22px; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f8f9fa; color: #7f8c8d; }
        
        .btn-view { background: #34495e; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-refresh { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 13px; }

        #secure-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; z-index: 9999; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; padding: 20px 0; }
        .modal-content { background: #fff; margin: 0 auto; padding: 50px; width: 210mm; position: relative; color: #333; }
        .modal-actions { position: fixed; top: 20px; right: 40px; display: flex; gap: 10px; z-index: 1001; }
        .btn-print { background: #e74c3c; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-close { background: #333; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; }

        .contract-view h1 { text-align: center; border: none; font-size: 28px; color: #000; }
        .c-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .c-table th, .c-table td { border: 1px solid #333; padding: 12px; font-size: 14px; }
        .sig-img { width: 140px; height: 60px; vertical-align: middle; }
        .hq-stamp { width: 60px; vertical-align: middle; }

        .docs-section { margin-top: 50px; border-top: 2px dashed #ccc; padding-top: 40px; }
        .doc-item { margin-bottom: 30px; page-break-inside: avoid; }
        .doc-img { max-width: 100%; border: 1px solid #ddd; }

        @media print {
            .container, .modal-actions, .no-print { display: none !important; }
            #modal { position: absolute; top: 0; background: white; padding: 0; }
            .modal-content { margin: 0; padding: 15mm; border: none; box-shadow: none; width: 100%; }
        }
    </style>
</head>
<body>

<div id="secure-overlay">🔒 보안 인증 대기 중...</div>

<div class="container">
    <h1>
        🛡️ 파트너 계약 보안 관리자 모드
        <button class="btn-refresh" onclick="location.reload()">새로고침</button>
    </h1>

    <table>
        <thead>
            <tr>
                <th>접수일</th>
                <th>성함/상호</th>
                <th>연락처</th>
                <th>유형</th>
                <th>작업</th>
            </tr>
        </thead>
        <tbody id="contract-list"></tbody>
    </table>
</div>

<div id="modal">
    <div class="modal-actions no-print">
        <button class="btn-print" onclick="printModal()">🖨️ 계약서+서류 통합 PDF 저장</button>
        <button class="btn-close" onclick="closeModal()">닫기</button>
    </div>
    
    <div class="modal-content" id="modal-body">
        <div class="contract-view">
            <h1>파트너 업무 위탁 계약서</h1>
            <table class="c-table">
                <tr><th>성함 / 상호</th><td><span id="m-name"></span></td></tr>
                <tr><th>연락처</th><td><span id="m-phone"></span></td></tr>
                <tr><th>구분</th><td><span id="m-type-info"></span></td></tr>
                <tr><th>주소</th><td><span id="m-addr"></span></td></tr>
            </table>
            <table class="c-table">
                <tr><th>본사(을)</th><td>(주)정수기마켓 [574-86-03026] <img src="https://raw.githubusercontent.com/a01059651000-creator/rentin/main/%EC%A3%BC%EC%8B%9D%ED%9A%8C%EC%82%AC%20%EC%A0%95%EC%88%98%EA%B8%B0%EB%A7%88%EC%BC%93_%EB%8F%84%EC%9E%A5.png" class="hq-stamp"></td></tr>
                <tr><th>파트너(갑)</th><td>성함: <span id="m-name-2"></span> (인) <img id="m-sig" class="sig-img"></td></tr>
            </table>
            <div id="m-date" style="text-align:center; font-weight:bold; margin-top:50px; font-size:18px;"></div>
        </div>
        <div class="docs-section" id="m-docs-area"></div>
    </div>
</div>

</body>
</html>
