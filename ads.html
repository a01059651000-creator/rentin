<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가전렌탈 파트너 실전 매뉴얼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-body: #0f1117;
  --bg-sidebar: #161820;
  --bg-card: #1e2130;
  --bg-card2: #252838;
  --primary: #e8004d;
  --primary-dim: rgba(232,0,77,0.12);
  --accent: #f59e0b;
  --accent-dim: rgba(245,158,11,0.12);
  --teal: #00c4b4;
  --teal-dim: rgba(0,196,180,0.1);
  --text-main: #f0f2f8;
  --text-muted: #8892a4;
  --border: rgba(255,255,255,0.07);
  --sidebar-width: 290px;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg-body);
  color: var(--text-main);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── 사이드바 ── */
.sidebar {
  width: var(--sidebar-width);
  height: 100%;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform 0.3s ease;
  z-index: 50;
}

.sidebar-header {
  padding: 24px 20px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, #1a0a1e 0%, #1e1230 100%);
  position: relative;
  overflow: hidden;
}
.sidebar-header::before {
  content: '';
  position: absolute; top: -30px; right: -30px;
  width: 100px; height: 100px;
  background: var(--primary);
  border-radius: 50%;
  opacity: 0.08;
}
.sidebar-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--primary-dim);
  border: 1px solid rgba(232,0,77,0.3);
  color: #ff6b8a;
  font-size: 10px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px;
  margin-bottom: 10px; letter-spacing: 0.5px;
}
.sidebar-header h1 {
  font-size: 15px; font-weight: 700; color: var(--text-main);
  line-height: 1.5;
}
.sidebar-header p {
  font-size: 11px; color: var(--text-muted); margin-top: 4px;
}

.sidebar-content {
  flex: 1; overflow-y: auto; padding: 16px 0;
}
.sidebar-content::-webkit-scrollbar { width: 4px; }
.sidebar-content::-webkit-scrollbar-track { background: transparent; }
.sidebar-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

.nav-group { margin-bottom: 20px; }
.nav-group-title {
  font-size: 10px; font-weight: 700; color: #4a5568;
  padding: 0 20px; margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 1px;
}
.nav-list { list-style: none; }
.nav-item { margin: 1px 0; }
.nav-link {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px;
  color: var(--text-muted); text-decoration: none;
  font-size: 13px; font-weight: 500;
  transition: all 0.2s; cursor: pointer;
  border-left: 3px solid transparent;
}
.nav-link:hover { background: rgba(255,255,255,0.04); color: var(--text-main); }
.nav-link.active {
  background: var(--primary-dim);
  color: #ff6b8a;
  border-left-color: var(--primary);
  font-weight: 700;
}
.nav-link .icon { width: 18px; text-align: center; font-size: 13px; flex-shrink: 0; }

.sidebar-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  font-size: 10px; color: #3a4050;
  text-align: center;
}

/* ── 메인 영역 ── */
.main-area {
  flex: 1; height: 100%;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

.mobile-header {
  display: none;
  height: 56px; background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
  align-items: center; padding: 0 16px; gap: 12px;
  flex-shrink: 0;
}
.menu-btn {
  background: none; border: none;
  font-size: 22px; color: var(--text-main); cursor: pointer;
}
.mobile-header-title { font-size: 14px; font-weight: 700; color: var(--text-main); }

.content-scroll {
  flex: 1; overflow-y: auto; padding: 48px 48px 80px;
  scroll-behavior: smooth;
}
.content-scroll::-webkit-scrollbar { width: 6px; }
.content-scroll::-webkit-scrollbar-track { background: transparent; }
.content-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

.article-container { max-width: 780px; margin: 0 auto; }

/* ── 본문 헤더 ── */
.chapter-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  padding: 4px 12px; border-radius: 20px; margin-bottom: 16px;
}
.badge-intro { background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(0,196,180,0.2); }
.badge-ch1 { background: var(--primary-dim); color: #ff6b8a; border: 1px solid rgba(232,0,77,0.2); }
.badge-ch2 { background: rgba(99,102,241,0.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.2); }
.badge-ch3 { background: rgba(236,72,153,0.1); color: #f9a8d4; border: 1px solid rgba(236,72,153,0.2); }
.badge-ch4 { background: var(--accent-dim); color: #fcd34d; border: 1px solid rgba(245,158,11,0.2); }
.badge-ch5 { background: rgba(16,185,129,0.1); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }

.page-title {
  font-size: 30px; font-weight: 900;
  color: var(--text-main); line-height: 1.3; margin-bottom: 12px;
}
.page-desc {
  font-size: 15px; color: var(--text-muted);
  margin-bottom: 36px; line-height: 1.6;
  padding-bottom: 28px; border-bottom: 1px solid var(--border);
}

/* ── 본문 타이포 ── */
.content-body h2 {
  font-size: 21px; font-weight: 700; color: var(--text-main);
  margin: 40px 0 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.content-body h2:first-child { margin-top: 0; }
.content-body h3 {
  font-size: 17px; font-weight: 700; color: #c4cde0;
  margin: 28px 0 12px;
  display: flex; align-items: center; gap: 8px;
}
.content-body h3::before {
  content: '';
  display: inline-block; width: 4px; height: 16px;
  background: var(--primary); border-radius: 2px; flex-shrink: 0;
}
.content-body p {
  font-size: 15px; line-height: 1.85;
  margin-bottom: 16px; color: #9aa3b8;
  word-break: keep-all;
}
.content-body ul, .content-body ol {
  margin-bottom: 16px; padding-left: 0; list-style: none;
}
.content-body li {
  font-size: 15px; line-height: 1.8; color: #9aa3b8;
  margin-bottom: 10px; padding-left: 20px; position: relative;
}
.content-body ul li::before {
  content: '›';
  position: absolute; left: 0; color: var(--primary); font-weight: 900; font-size: 16px;
}
.content-body ol { counter-reset: ol-counter; }
.content-body ol li { counter-increment: ol-counter; }
.content-body ol li::before {
  content: counter(ol-counter);
  position: absolute; left: 0;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--primary-dim); color: #ff6b8a;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  top: 4px;
}
.content-body strong { color: var(--text-main); font-weight: 700; }
.content-body em { color: var(--accent); font-style: normal; font-weight: 600; }

/* ── 박스 컴포넌트 ── */
.info-box {
  background: var(--teal-dim);
  border: 1px solid rgba(0,196,180,0.2);
  border-radius: 12px; padding: 20px 22px;
  margin: 24px 0;
}
.info-box.warn {
  background: var(--accent-dim);
  border-color: rgba(245,158,11,0.2);
}
.info-box.danger {
  background: var(--primary-dim);
  border-color: rgba(232,0,77,0.2);
}
.info-box.purple {
  background: rgba(99,102,241,0.08);
  border-color: rgba(99,102,241,0.2);
}
.info-box .box-title {
  font-size: 14px; font-weight: 700; margin-bottom: 10px;
  color: var(--teal); display: flex; align-items: center; gap: 6px;
}
.info-box.warn .box-title { color: var(--accent); }
.info-box.danger .box-title { color: #ff6b8a; }
.info-box.purple .box-title { color: #a5b4fc; }
.info-box p, .info-box li { color: #8892a4; font-size: 14px; }
.info-box li { margin-bottom: 6px; }

.step-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 20px 22px;
  margin: 24px 0;
}
.step-title {
  font-size: 13px; font-weight: 700; color: var(--text-muted);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 16px;
}
.step-list { list-style: none !important; padding: 0 !important; }
.step-list li {
  display: flex; gap: 14px; padding: 12px 0;
  border-bottom: 1px solid var(--border);
  padding-left: 0 !important;
}
.step-list li:last-child { border: none; padding-bottom: 0; }
.step-list li::before { display: none !important; }
.step-num {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--primary-dim);
  border: 1px solid rgba(232,0,77,0.2);
  color: #ff6b8a; font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
}
.step-content strong { display: block; font-size: 14px; color: var(--text-main); margin-bottom: 3px; }
.step-content span { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

/* 테이블 */
.table-wrap { overflow-x: auto; margin: 24px 0; border-radius: 12px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; min-width: 480px; }
th, td { padding: 12px 16px; font-size: 13px; text-align: left; border-bottom: 1px solid var(--border); }
th { background: var(--bg-card2); font-weight: 700; color: var(--text-main); }
td { color: #9aa3b8; background: var(--bg-card); }
tr:last-child td { border-bottom: none; }
td strong { color: var(--text-main); }

/* 하이라이트 카드 */
.highlight-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px; margin: 24px 0;
}
.highlight-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 18px;
  transition: border-color 0.2s;
}
.highlight-card:hover { border-color: rgba(232,0,77,0.3); }
.hc-icon { font-size: 24px; margin-bottom: 10px; }
.hc-title { font-size: 13px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
.hc-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

/* 수익 카드 */
.income-grid { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
.income-card {
  border-radius: 12px; padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border: 1px solid var(--border);
}
.income-card.lv1 { background: var(--bg-card); }
.income-card.lv2 { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.2); }
.income-card.lv3 { background: linear-gradient(135deg, rgba(232,0,77,0.15), rgba(245,158,11,0.1)); border-color: rgba(232,0,77,0.3); }
.income-left .lv-label { font-size: 13px; font-weight: 700; color: var(--text-main); }
.income-left .lv-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.income-right .lv-amount { font-size: 22px; font-weight: 900; }
.income-card.lv1 .lv-amount { color: #c4cde0; }
.income-card.lv2 .lv-amount { color: #a5b4fc; }
.income-card.lv3 .lv-amount { color: #fcd34d; }

/* 스크립트 박스 */
.script-box {
  background: var(--bg-card2);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 20px;
  margin: 16px 0; position: relative;
}
.script-label {
  position: absolute; top: -10px; left: 16px;
  background: var(--primary); color: white;
  font-size: 10px; font-weight: 700;
  padding: 2px 10px; border-radius: 10px; letter-spacing: 0.5px;
}
.script-box p {
  font-size: 14px; line-height: 1.8; color: #c4cde0;
  margin: 0; font-style: italic;
}
.script-box strong { color: #fcd34d; font-style: normal; }

/* 키워드 태그 */
.tag-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
.kw-tag {
  background: var(--bg-card2); border: 1px solid var(--border);
  color: var(--text-muted); font-size: 12px; font-weight: 500;
  padding: 5px 12px; border-radius: 20px;
  transition: all 0.2s; cursor: default;
}
.kw-tag:hover { border-color: var(--primary); color: #ff6b8a; }
.kw-tag.good { border-color: rgba(0,196,180,0.3); color: var(--teal); background: var(--teal-dim); }
.kw-tag.bad { border-color: rgba(232,0,77,0.2); color: #ff6b8a; background: var(--primary-dim); text-decoration: line-through; }

/* 이전/다음 버튼 */
.page-nav {
  display: flex; justify-content: space-between;
  margin-top: 60px; padding-top: 24px;
  border-top: 1px solid var(--border); gap: 12px;
}
.p-btn {
  display: flex; flex-direction: column; padding: 16px 20px;
  border: 1px solid var(--border); border-radius: 12px;
  color: var(--text-main); width: 48%;
  transition: all 0.2s; cursor: pointer;
  background: var(--bg-card);
  text-align: left;
}
.p-btn:hover { border-color: var(--primary); background: var(--primary-dim); }
.p-btn span { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.p-btn strong { font-size: 14px; font-weight: 700; color: var(--text-main); }
.p-btn.next { align-items: flex-end; text-align: right; }

/* 오버레이 */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 40; display: none;
}
.overlay.show { display: block; }

/* ── 반응형 ── */
@media (max-width: 768px) {
  .sidebar {
    position: absolute; left: 0; top: 0;
    transform: translateX(-100%);
    box-shadow: 4px 0 24px rgba(0,0,0,0.5);
  }
  .sidebar.open { transform: translateX(0); }
  .mobile-header { display: flex; }
  .content-scroll { padding: 24px 18px 60px; }
  .page-title { font-size: 24px; }
  .page-nav { flex-direction: column; }
  .p-btn { width: 100%; }
  .highlight-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- 사이드바 -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-badge">🔐 파트너 전용</div>
    <h1>가전렌탈 파트너<br>실전 매뉴얼</h1>
    <p>대외비 · 무단 배포 금지</p>
  </div>
  <div class="sidebar-content" id="sidebarNav"></div>
  <div class="sidebar-footer">© 2026 가전렌탈 파트너스 · All rights reserved</div>
</aside>

<!-- 메인 -->
<main class="main-area">
  <header class="mobile-header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="mobile-header-title">파트너 실전 매뉴얼</div>
  </header>

  <div class="content-scroll" id="scrollArea">
    <div class="article-container">
      <div class="chapter-badge badge-intro" id="chapterBadge">INTRO</div>
      <h1 class="page-title" id="pageTitle">불러오는 중...</h1>
      <p class="page-desc" id="pageDesc"></p>
      <div class="content-body" id="contentBody"></div>
      <div class="page-nav">
        <button class="p-btn prev" id="btnPrev" onclick="navigate(-1)">
          <span>◀ 이전</span>
          <strong id="prevText"></strong>
        </button>
        <button class="p-btn next" id="btnNext" onclick="navigate(1)">
          <span>다음 ▶</span>
          <strong id="nextText"></strong>
        </button>
      </div>
    </div>
  </div>
</main>

<script>
const manualData = [

  // ══════════════════ INTRO ══════════════════
  {
    group: "INTRO",
    badge: "badge-intro",
    badgeText: "INTRO",
    pages: [
      {
        id: "intro-0", icon: "📖", title: "이 전자책을 읽는 법",
        desc: "이 매뉴얼을 최대한 활용하는 방법을 먼저 확인하세요.",
        content: `
          <h2>이 매뉴얼은 '실전 영업 교과서'입니다</h2>
          <p>이론만 가득한 일반 교육 자료와 다릅니다. 실제로 수익을 내고 있는 파트너들의 노하우를 압축해서 담았습니다. 처음부터 끝까지 한 번 정독한 후, 자신이 집중할 채널의 챕터를 반복해서 참고하는 방식을 권장합니다.</p>
          <div class="highlight-grid">
            <div class="highlight-card">
              <div class="hc-icon">🎯</div>
              <div class="hc-title">타겟 독자</div>
              <div class="hc-desc">영업 경험 0인 완전 초보부터 수익을 늘리고 싶은 기존 파트너까지 모두 해당됩니다.</div>
            </div>
            <div class="highlight-card">
              <div class="hc-icon">⏱️</div>
              <div class="hc-title">예상 소요 시간</div>
              <div class="hc-desc">전체 정독 약 2~3시간. 챕터별 참고 시 5~10분이면 충분합니다.</div>
            </div>
            <div class="highlight-card">
              <div class="hc-icon">🔄</div>
              <div class="hc-title">업데이트</div>
              <div class="hc-desc">시장 변화에 따라 내용이 지속 업데이트됩니다. 북마크해두고 주기적으로 확인하세요.</div>
            </div>
            <div class="highlight-card">
              <div class="hc-icon">💬</div>
              <div class="hc-title">문의</div>
              <div class="hc-desc">매뉴얼 내용 중 모르는 부분은 담당 매니저에게 언제든지 질문하세요.</div>
            </div>
          </div>
          <div class="info-box">
            <div class="box-title">💡 이 매뉴얼을 100% 활용하는 팁</div>
            <ul>
              <li>읽기만 하지 말고, <strong>당장 오늘부터 하나씩 실행</strong>하는 것이 핵심입니다.</li>
              <li>블로그 1개, 인스타 계정 1개라도 만들어놓고 이 매뉴얼을 참고하면 이해 속도가 3배 빨라집니다.</li>
              <li>상담 스크립트는 외울 때까지 반복해서 읽으세요. 자연스럽게 나와야 효과가 있습니다.</li>
            </ul>
          </div>
        `
      },
      {
        id: "intro-1", icon: "🧠", title: "파트너 시작 전 마인드셋",
        desc: "수익이 나는 파트너와 포기하는 파트너의 결정적 차이",
        content: `
          <h2>가장 먼저 버려야 할 생각 3가지</h2>
          <div class="info-box danger">
            <div class="box-title">❌ 이 생각부터 버리세요</div>
            <ul>

// ── 수수료 계산기 함수 ──
let selectedPeriod = 60;
let selectedRate = 14;

function setPeriod(p) {
  selectedPeriod = p;
  ['36','48','60'].forEach(n => {
    const btn = document.getElementById('btn'+n);
    if(btn) {
      btn.style.background = String(n) == String(p) ? 'var(--primary)' : 'var(--bg-card2)';
      btn.style.borderColor = String(n) == String(p) ? 'var(--primary)' : 'var(--border)';
      btn.style.color = String(n) == String(p) ? 'white' : 'var(--text-muted)';
    }
  });
  calcCommission();
}

function updateRate() {
  const slider = document.getElementById('rateSlider');
  if(!slider) return;
  selectedRate = parseFloat(slider.value);
  const d = document.getElementById('rateDisplay');
  const r = document.getElementById('resultRate');
  if(d) d.textContent = selectedRate + '%';
  if(r) r.textContent = selectedRate + '%';
  calcCommission();
}

function calcCommission() {
  const el = document.getElementById('monthlyFee');
  if(!el) return;
  const monthly = parseFloat(el.value) || 0;
  const total = monthly * selectedPeriod;
  const commission = Math.round(total * (selectedRate / 100));
  const rt = document.getElementById('resultTotal');
  const rc = document.getElementById('resultCommission');
  const rp = document.getElementById('resultPeriod');
  if(rt) rt.textContent = total > 0 ? total.toLocaleString() + '원' : '-';
  if(rc) rc.textContent = commission > 0 ? commission.toLocaleString() + '원' : '-';
  if(rp) rp.textContent = selectedPeriod + '개월';
}

// ── 시스템 로직 ──
let flatPages = [];
manualData.forEach(group => {
  group.pages.forEach(page => {
    flatPages.push({ ...page, badge: group.badge, badgeText: group.badgeText });
  });
});

let currentIndex = 0;

function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  manualData.forEach(group => {
    const g = document.createElement('div');
    g.className = 'nav-group';
    g.innerHTML = `<div class="nav-group-title">${group.group}</div>`;
    const ul = document.createElement('ul');
    ul.className = 'nav-list';
    group.pages.forEach(page => {
      const li = document.createElement('li');
      li.className = 'nav-item';
      const a = document.createElement('a');
      a.className = 'nav-link';
      a.id = `link-${page.id}`;
      a.innerHTML = `<span class="icon">${page.icon}</span>${page.title}`;
      a.onclick = (e) => {
        e.preventDefault();
        const idx = flatPages.findIndex(p => p.id === page.id);
        loadPage(idx);
        if (window.innerWidth <= 768) toggleSidebar();
      };
      li.appendChild(a);
      ul.appendChild(li);
    });
    g.appendChild(ul);
    nav.appendChild(g);
  });
}

function loadPage(index) {
  if (index < 0 || index >= flatPages.length) return;
  currentIndex = index;
  const p = flatPages[currentIndex];
  document.getElementById('chapterBadge').className = `chapter-badge ${p.badge}`;
  document.getElementById('chapterBadge').textContent = p.badgeText;
  document.getElementById('pageTitle').textContent = p.title;
  document.getElementById('pageDesc').textContent = p.desc;
  document.getElementById('contentBody').innerHTML = p.content;
  document.getElementById('scrollArea').scrollTop = 0;
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  const al = document.getElementById(`link-${p.id}`);
  if (al) al.classList.add('active');
  updateNav();
}

function updateNav() {
  const prev = document.getElementById('btnPrev');
  const next = document.getElementById('btnNext');
  if (currentIndex === 0) { prev.style.visibility = 'hidden'; }
  else { prev.style.visibility = 'visible'; document.getElementById('prevText').textContent = flatPages[currentIndex - 1].title; }
  if (currentIndex === flatPages.length - 1) { next.style.visibility = 'hidden'; }
  else { next.style.visibility = 'visible'; document.getElementById('nextText').textContent = flatPages[currentIndex + 1].title; }
}

function navigate(dir) { loadPage(currentIndex + dir); }

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

renderSidebar();
loadPage(0);
</script>
